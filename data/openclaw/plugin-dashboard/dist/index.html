<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Company Brain — Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--bd:#30363d;--bd2:#21262d;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#6e7681;
  --blue:#58a6ff;--green:#3fb950;--yellow:#d29922;--orange:#db6d28;--red:#f85149;--purple:#a371f7;
  --ff:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
html,body{background:var(--bg);color:var(--tx);font-family:var(--ff);font-size:14px;line-height:1.5;min-height:100vh}

/* ── Layout ── */
.app{max-width:1440px;margin:0 auto;padding:20px 16px}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;
     padding-bottom:14px;border-bottom:1px solid var(--bd)}
.hdr-l h1{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.hdr-l h1 em{color:var(--blue);font-style:normal}
.hdr-meta{font-size:11px;color:var(--tx2);margin-top:3px}
.btn{background:var(--bg2);border:1px solid var(--bd);color:var(--tx);padding:5px 12px;
     border-radius:6px;cursor:pointer;font-size:12px;transition:background .15s}
.btn:hover{background:var(--bg3)}
.live-badge{font-size:10px;padding:2px 7px;border-radius:10px;margin-left:6px;
            background:#0d2d0d;color:var(--green);border:1px solid #1a4a1a;display:none}

/* ── Stats row ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.stat{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:14px 16px}
.stat-v{font-size:26px;font-weight:700;line-height:1;margin-bottom:2px}
.stat-l{font-size:11px;color:var(--tx2)}

/* ── Grid ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:380px 1fr;gap:14px}
@media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr}}

/* ── Panel ── */
.panel{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;border-bottom:1px solid var(--bd)}
.pt{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px}
.pc{background:var(--bd);color:var(--tx2);border-radius:10px;padding:1px 8px;font-size:11px}

/* ── Badges ── */
.b{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.b-critical{background:#3d1010;color:var(--red);border:1px solid #5a1515}
.b-high{background:#2d1b00;color:var(--orange);border:1px solid #4a2c00}
.b-medium{background:#2a2200;color:var(--yellow);border:1px solid #403300}
.b-low{background:#0d2d0d;color:var(--green);border:1px solid #1a4a1a}
.b-resolved,.b-done{background:#0d2d1a;color:var(--green);border:1px solid #1a4a2a}
.b-open{background:#0d1b2d;color:var(--blue);border:1px solid #1a2e4a}
.b-in_progress{background:#1e1b2d;color:var(--purple);border:1px solid #2d2a4a}
.b-P1{background:#3d1010;color:var(--red);border:1px solid #5a1515}
.b-P2{background:#2d1b00;color:var(--orange);border:1px solid #4a2c00}
.b-P3{background:#2a2200;color:var(--yellow);border:1px solid #403300}
.b-trivial{background:#0d2d0d;color:var(--green);border:1px solid #1a4a1a}

/* ── Bug list ── */
.bug{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd2);transition:background .1s;cursor:default}
.bug:last-child{border-bottom:none}
.bug:hover{background:var(--bg3)}
.bug-id{font-size:11px;color:var(--tx3);font-family:monospace;min-width:66px;padding-top:1px;flex-shrink:0}
.bug-body{flex:1;min-width:0}
.bug-title{font-size:13px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis}
.bug-title.resolved{text-decoration:line-through;color:var(--tx2)}
.bug-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.bug-desc{font-size:11px;color:var(--tx2);margin-top:4px;line-height:1.4;display:none}
.bug:hover .bug-desc{display:block}

/* ── Task list ── */
.task{display:flex;align-items:flex-start;gap:8px;padding:9px 14px;
      border-bottom:1px solid var(--bd2);transition:background .1s}
.task:last-child{border-bottom:none}
.task:hover{background:var(--bg3)}
.task-id{font-size:11px;color:var(--tx3);font-family:monospace;min-width:72px;flex-shrink:0;padding-top:1px}
.task-title{flex:1;font-size:13px}
.task-title.done{text-decoration:line-through;color:var(--tx2)}
.task-effort{font-size:11px;color:var(--tx3);flex-shrink:0}

/* ── Users ── */
.users-wrap{padding:12px}
.ucard{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:12px;margin-bottom:8px}
.ucard:last-child{margin-bottom:0}
.u-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.u-name{font-size:13px;font-weight:600}
.u-uid{font-size:11px;color:var(--tx3);font-family:monospace;margin-top:1px}
.u-role{font-size:11px;color:var(--tx2)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.d-green{background:var(--green);box-shadow:0 0 6px var(--green)}
.d-yellow{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.d-red{background:var(--red);box-shadow:0 0 6px var(--red)}
.d-blue{background:var(--blue)}
.d-gray{background:var(--tx3)}
.u-checks{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.uc{font-size:11px;display:flex;align-items:center;gap:4px}
.uc-ok{color:var(--green)}
.uc-warn{color:var(--yellow)}
.uc-err{color:var(--red)}

/* ── Sessions ── */
.sess-wrap{padding:14px}
.prog-bar-bg{background:var(--bg);border-radius:4px;height:8px;overflow:hidden;margin:8px 0}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:4px;transition:width .5s ease}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:var(--tx2)}
.by-user{font-size:11px;color:var(--tx2);margin-bottom:12px}

/* ── Session table ── */
.stbl{width:100%;border-collapse:collapse;font-size:12px}
.stbl th{text-align:left;padding:5px 8px;color:var(--tx2);font-weight:500;border-bottom:1px solid var(--bd)}
.stbl td{padding:5px 8px;border-bottom:1px solid var(--bd2)}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:var(--bg3)}
.mono{font-family:monospace;font-size:11px}

/* ── Scroll ── */
.scroll{max-height:420px;overflow-y:auto}
.scroll::-webkit-scrollbar{width:4px}
.scroll::-webkit-scrollbar-track{background:transparent}
.scroll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

/* ── Section title ── */
.section{margin-bottom:8px;font-size:11px;font-weight:600;color:var(--tx3);
         text-transform:uppercase;letter-spacing:.5px;padding:0 14px}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-l">
      <h1>🧠 Company <em>Brain</em> — Analysis Dashboard</h1>
      <div class="hdr-meta" id="meta"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="live-badge" id="live-badge">● LIVE</span>
      <button class="btn" onclick="tryFetch()">↻ Refresh</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- Bugs + Tasks -->
  <div class="grid2">
    <div class="panel">
      <div class="ph"><span class="pt">Bugs</span><span class="pc" id="bug-ct"></span></div>
      <div class="scroll" id="bugs"></div>
    </div>
    <div class="panel">
      <div class="ph"><span class="pt">Improvement Tasks</span><span class="pc" id="task-ct"></span></div>
      <div class="scroll" id="tasks"></div>
    </div>
  </div>

  <!-- Users + Sessions -->
  <div class="grid3">
    <div class="panel">
      <div class="ph"><span class="pt">Users</span><span class="pc" id="user-ct"></span></div>
      <div class="users-wrap" id="users"></div>
    </div>
    <div class="panel">
      <div class="ph"><span class="pt">Session Analysis Progress</span></div>
      <div class="sess-wrap">
        <div class="prog-row" id="prog-row"></div>
        <div class="prog-bar-bg"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
        <div class="by-user" id="by-user"></div>
        <table class="stbl">
          <thead><tr>
            <th>File</th><th>User</th><th>Topic</th><th>Date</th><th>Bugs found</th>
          </tr></thead>
          <tbody id="sess-rows"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>
<script>
const DATA={"bugs":[{"id":"BUG-001","title":"NO_REPLY ghost responses + duplicate messages","severity":"high","status":"open","affected_users":["264468965"],"sessions":["89542e6b-1d77-4e49-91d9-19425f6fa698-topic-849.jsonl"],"first_seen":"2026-07-03","last_seen":"2026-07-03","description":"Agent sends a response, then immediately sends NO_REPLY, then repeats the entire response again. This results in users seeing every assistant message twice plus a stray NO_REPLY.","evidence":["L29: [asst]: NO_REPLY","L30: [asst]: (same as L25 — full message repeated)","L43: [asst]: NO_REPLY","L44: [asst]: (same as L37 — full message repeated)","L122: [asst]: NO_REPLY"],"root_cause":"OpenClaw delivery confirmation timing. Agent sends message, confirmation doesn't arrive before next turn, agent retries the entire response. The NO_REPLY sentinel is an OpenClaw signal that gets embedded in the session.","impact":"Every Telegram message appears twice. Poor UX. Wastes tokens.","fix":"Investigate OpenClaw delivery confirmation logic. Check if ACK timeout is too short. May need to configure deduplication on the session layer."},{"id":"BUG-002","title":"li-post.sh fails to read access_token despite valid token","severity":"high","status":"open","affected_users":["547748231"],"sessions":["113b6347-30ab-48ac-8e9c-3179d73629cf-topic-695.jsonl"],"first_seen":"2026-07-14","last_seen":"2026-07-14","description":"When Catherine tries to publish a post, li-post.sh returns NO_TOKEN exit code 2, even though: (1) GATE1=pass, (2) token file has the correct keys, (3) token is not expired (expires_at=1788600376, now≈1784046709). Agent self-debugs by listing keys and checking timestamps, then succeeds by 'trying directly'. The exact cause is variable passing: TELEGRAM_USER_ID likely not set in the execution env when li-post.sh is called from the skill.","evidence":["L77: [toolResult]: NO_TOKEN: *** LinkedIn account linked for Telegram user (Command exited with code 2)","L79: [toolResult]: [access_token, display_name, expires_at, linked_at, linkedin_urn, refresh_token] (keys exist)","L83: [toolResult]: 1788600376 / 1784046709 (expires_at > now, token valid)","L84: [asst]: Токен валідний. Проблема в передачі змінної. Спробую напряму","L85: [toolResult]: OK: https://www.linkedin.com/feed/update/urn:li:share:7482834291794702336/"],"root_cause":"TELEGRAM_USER_ID env var not available in the bash execution context when li-post.sh is invoked from inside the skill's bash block. The GATE1 check runs fine because it's inline bash with $TELEGRAM_USER_ID already set. But when the skill invokes li-post.sh as a subprocess, the env var may not be exported.","impact":"Publish fails on first attempt. Agent requires extra debugging turn to succeed. Catherine experiences a ~30-60 second delay and sees error output.","fix":"In the linkedin-publish skill, explicitly pass TELEGRAM_USER_ID as argument or ensure it is exported before calling li-post.sh. Add: export TELEGRAM_USER_ID before the li-post.sh call, or pass it as: TELEGRAM_USER_ID=$TELEGRAM_USER_ID li-post.sh ..."},{"id":"BUG-003","title":"Catherine's strategy.md and content-calendar.md always missing","severity":"high","status":"open","affected_users":["547748231"],"sessions":["b97265ab-2809-4a46-8d24-b40848b3931e-topic-695.jsonl","113b6347-30ab-48ac-8e9c-3179d73629cf-topic-695.jsonl","86786875-f153-4e24-894c-a4ad3b9dc472-topic-695.jsonl.reset.2026-07-14"],"first_seen":"2026-07-14","last_seen":"2026-07-20","description":"Every session for Catherine produces ENOENT errors for /data/workspace/social/linkedin/547748231/strategy.md and /data/workspace/social/linkedin/547748231/content-calendar.md. These files either were never created or were created but never pushed to git (brain-push was broken). After pod restart, git reset --hard wipes pod workspace to match remote, removing any locally-created files.","evidence":["L11 [toolResult]: {error: ENOENT: no such file or directory, access '/data/workspace/social/linkedin/547748231/strategy.md'}","L13 [toolResult]: {error: ENOENT: no such file or directory, access '/data/workspace/social/linkedin/547748231/content-calendar.md'}","Same error in session 113b6347 L41"],"root_cause":"Files created on pod but brain-push was broken (diverged git history). Files never reached git remote. On pod restart: git reset --hard origin/master removes them. Now that brain-push is fixed, new files will persist — but existing ones need to be created.","impact":"Agent can't read content strategy or calendar. Falls back to generic suggestions. Agent reads brand voice but can't plan content systematically.","fix":"1) Create strategy.md and content-calendar.md for Catherine (uid 547748231). 2) Verify brain-push is now working (DONE). 3) Files will survive restarts once pushed to git."},{"id":"BUG-004","title":"web_search disabled — no search provider configured","severity":"medium","status":"open","affected_users":["264468965"],"sessions":["89542e6b-1d77-4e49-91d9-19425f6fa698-topic-849.jsonl"],"first_seen":"2026-07-03","last_seen":"2026-07-03","description":"Agent says 'Web search is offline' when trying to find trending topics. Falls back to browser scraping. linkedin-trends skill likely relies on web_search tool via ZeroEntropy or Perplexity.","evidence":["L15: [asst]: Web search is offline — let me pull trending articles directly","L32: [asst]: Web search is offline — let me pull trending articles directly"],"root_cause":"ZEROENTROPY_API_KEY env var not set in the container, or search provider not configured in openclaw config.","impact":"Trend research quality reduced. Agent scrapes browser instead of proper search. Works around the issue successfully but less efficiently.","fix":"Set ZEROENTROPY_API_KEY in the container environment, OR configure an alternative search provider (Brave, Perplexity, etc.) in the OpenClaw config."},{"id":"BUG-005","title":"Browser tool unavailable for JS-heavy pages","severity":"medium","status":"open","affected_users":["264468965"],"sessions":["89542e6b-1d77-4e49-91d9-19425f6fa698-topic-849.jsonl"],"first_seen":"2026-07-03","last_seen":"2026-07-03","description":"When Andrii asks the agent to read benchgen.com blog pages (SPA / Next.js), the browser tool fails. Agent tried to use browser for JS-rendered content (L74: 'Browser unavailable') and fell back to raw HTML fetch. Some pages worked (SSR), others didn't.","evidence":["L74: [asst]: Browser unavailable. Let me check for an API or cached content","L77: The benchgen blog is a single-page app — content isn't extractable via web fetch and browser is unavailable","L102: same issue for /blog/rl-framework","L106: /blog/rl-framework page is client-rendered, API returns 404"],"root_cause":"Browser/Playwright tool not installed or configured in the container.","impact":"Can't scrape JS-rendered website pages. Partially mitigated by raw HTML fallback for SSR pages. /blog pages fully inaccessible.","fix":"Install Playwright/Puppeteer in the container OR configure OpenClaw browser tool. Alternatively, add a Next.js SSR export for /blog pages."},{"id":"BUG-006","title":"Frequent session resets cause context loss","severity":"medium","status":"open","affected_users":["547748231"],"sessions":["b7181a9f-topic-695 (reset 2026-07-06)","51631d10-topic-695 (reset 2026-07-07)","85e098e3-topic-695 (reset 2026-07-07)","b70ffecc-topic-695 (reset 2026-07-10)","4a87f71d-topic-695 (reset 2026-07-13)","4a87f71d-topic-695 (reset 2026-07-13)","86786875-topic-695 (reset 2026-07-14)"],"first_seen":"2026-07-06","last_seen":"2026-07-14","description":"Catherine's session has been reset 7+ times in 18 days. Each reset starts a fresh context window. This means the agent forgets: previous post drafts, agreed content plans, user preferences communicated in conversation. Although scheduled cron jobs survive (they're separate OpenClaw tasks), the agent doesn't remember the history.","evidence":"7 .reset files for topic-695 in 18 days","root_cause":"OpenClaw automatic session compaction/reset when context window limit is reached. Sessions with many tool calls (image analysis, script execution, file reads) fill up the context faster.","impact":"Users must re-introduce themselves or re-explain context frequently. Agent can't learn from past interactions within the same session lineage. Scheduled posts created in old sessions may be forgotten.","fix":"1) Configure OpenClaw session memory settings to extend context limit. 2) Use log-export.sh + MEMORY.md to persist session summaries. 3) Add explicit 'session start' protocol where agent reads previous notes automatically."},{"id":"BUG-007","title":"Empty refresh_token — LinkedIn token can't auto-renew","severity":"low","status":"open","affected_users":["547748231"],"sessions":["51631d10-e1b3-4ecd-be2b-ff45307ff0db-topic-695.jsonl"],"first_seen":"2026-06-29","last_seen":"2026-07-07","description":"Catherine's LinkedIn token entry has empty refresh_token. LinkedIn OAuth supports refresh tokens (365-day expiry) for apps with the r_basicprofile scope. Without a refresh token, the access_token cannot be renewed automatically — Catherine must manually re-authenticate after it expires (~August 29, 2026).","evidence":["Session 51631d10 L28: STATUS: OK, {access_token: ***, refresh_token: '', expires_at: 1787918657, ...}"],"root_cause":"li-auth.sh OAuth exchange didn't store the refresh_token (it may not be returned by LinkedIn API unless the app has the right scopes, or li-auth.sh doesn't capture it).","impact":"Token expires in ~60 days. Catherine will need to manually reconnect LinkedIn around Aug 29, 2026.","fix":"Check LinkedIn app permissions — add 'r_basicprofile' scope if missing. Update li-auth.sh to capture and store refresh_token. Implement auto-refresh logic in GATE1 check."},{"id":"BUG-008","title":"brain-push.sh git sync was broken (482 diverged commits)","severity":"critical","status":"resolved","affected_users":["264468965","547748231","373382939"],"sessions":[],"first_seen":"2026-07-03","last_seen":"2026-07-20","resolved_on":"2026-07-20","description":"brain-push.sh was silently failing on every push due to diverged git history. 482 orphaned commits accumulated. Workspace changes (new files, memory, LinkedIn profiles) were not persisted to git. On pod restart, git reset --hard restored the old state — wiping all recent agent work.","root_cause":"git push was failing due to diverged remote. Script had no error handling and kept creating unreachable commits.","fix_applied":"Added fetch→rebase -X ours→push HEAD:master pattern to brain-push.sh. All diverged history resolved and workspace fully synced to remote.","impact":"Catherine's strategy.md, content-calendar.md, and other files were repeatedly wiped. This is the root cause of BUG-003 and partly BUG-002."}],"tasks":[{"id":"TASK-001","title":"Fix li-post.sh TELEGRAM_USER_ID variable passing","priority":"P1","status":"open","bug":"BUG-002","effort":"small","description":"li-post.sh fails with NO_TOKEN even when token is valid. Root cause: TELEGRAM_USER_ID env var not exported to subprocess context when skill calls li-post.sh.","steps":["Open /data/workspace/skills/linkedin-publish/SKILL.md","Find the bash block that calls li-post.sh","Add 'export TELEGRAM_USER_ID' before the call, OR use: TELEGRAM_USER_ID=\"$TELEGRAM_USER_ID\" li-post.sh ...","Test with Catherine (uid 547748231)"],"files":["/data/workspace/skills/linkedin-publish/SKILL.md"]},{"id":"TASK-002","title":"Create Catherine's strategy.md and content-calendar.md","priority":"P1","status":"open","bug":"BUG-003","effort":"medium","description":"Catherine is missing strategy.md and content-calendar.md. Agent fails to read them on every session start (ENOENT). This limits content planning quality.","steps":["Ask Catherine about her content goals, posting frequency, target audience","Create /data/workspace/social/linkedin/547748231/strategy.md with: goals, posting cadence, key messages, topic pillars","Create /data/workspace/social/linkedin/5477482 "enoent":true,"linkedin_error":false,"tool_errors":[]},"analyzed":false,"findings":[]},"ff387096-abc3-43ad-a511-acba03e3526a.jsonl.reset.2026-07-03T06-58-13.772Z":{"uuid":"ff387096-abc3-43ad-a511-acba03e3526a","file":"ff387096-abc3-43ad-a511-acba03e3526a.jsonl.reset.2026-07-03T06-58-13.772Z","session_key":"?","topic":null,"user_id":null,"user_name":null,"status":"reset","date":"2026-07-03","first_ts":"2026-07-02T11:13:40.306Z","last_ts":"2026-07-03T06:44:01.979Z","lines":281,"trajectory_file":"ff387096-abc3-43ad-a511-acba03e3526a.trajectory.jsonl","flags":{"gate1_fail":false,"gate1_pass":false,"enoent":true,"linkedin_error":false,"tool_errors":["{'role': 'toolResult', 'toolCallId': 'call_a759b47086684aa7b7eeaa6b', 'toolName': 'read', 'content':","{'role': 'toolResult', 'toolCallId': 'call_ba2737c6f6824c77b8525541', 'toolName': 'message', 'conten","{'role': 'toolResult', 'toolCallId': 'call_30e2641368424a359e1bb65c', 'toolName': 'read', 'content':","{'role': 'toolResult', 'toolCallId': 'call_07f808c637ad44c89a339028', 'toolName': 'web_search', 'con","{'role': 'toolResult', 'toolCallId': 'call_18cb21c13b894dabbc0bb0a3', 'toolName': 'web_search', 'con"]},"analyzed":false,"findings":[]}},"built_at":"2026-07-20 14:18 UTC","stats":{"total_bugs":8,"open_bugs":7,"resolved_bugs":1,"total_tasks":10,"open_tasks":10,"done_tasks":0,"total_sessions":37,"analyzed_sessions":6,"total_users":3}};

const SEV_ORDER={critical:0,high:1,medium:2,low:3};
const UNAMES={'264468965':'Andrii','373382939':'Rudolf','547748231':'Catherine'};

function badge(cls,label){return`<span class="b b-${cls}">${label}</span>`}
function sevBadge(s){return badge(s,s.toUpperCase())}
function stBadge(s){
  if(s==='resolved')return badge('resolved','✓ resolved');
  if(s==='done')return badge('done','✓ done');
  if(s==='open')return badge('open','open');
  if(s==='in_progress')return badge('in_progress','in progress');
  return s;
}
function priBadge(p){return badge(p,p)}
function effort(e){
  const map={trivial:'5min',small:'~1h',medium:'~1d',large:'2d+'};
  return map[e]||e||'';
}

function render(d){
  const {bugs,tasks,users,sessions,session_map,stats,built_at}=d;

  // meta
  document.getElementById('meta').textContent=
    `Built: ${built_at} · v${stats.total_sessions} sessions · ${stats.total_users} users`;

  // stats
  const sd=[
    {v:stats.total_sessions,    l:'Sessions total',   c:'var(--blue)'},
    {v:`${stats.analyzed_sessions}/${stats.total_sessions}`, l:'Analyzed', c:'var(--purple)'},
    {v:stats.open_bugs,         l:'Open bugs',        c:stats.open_bugs>5?'var(--orange)':'var(--yellow)'},
    {v:stats.resolved_bugs,     l:'Resolved bugs',    c:'var(--green)'},
    {v:stats.open_tasks,        l:'Open tasks',       c:'var(--tx)'},
    {v:stats.done_tasks,        l:'Done tasks',       c:'var(--green)'},
  ];
  document.getElementById('stats').innerHTML=sd.map(s=>
    `<div class="stat"><div class="stat-v" style="color:${s.c}">${s.v}</div><div class="stat-l">${s.l}</div></div>`
  ).join('');

  // bugs
  document.getElementById('bug-ct').textContent=`${stats.open_bugs} open / ${stats.total_bugs} total`;
  const sortedBugs=[...bugs].sort((a,b)=>{
    if(a.status==='resolved'&&b.status!=='resolved')return 1;
    if(b.status==='resolved'&&a.status!=='resolved')return -1;
    return(SEV_ORDER[a.severity]||9)-(SEV_ORDER[b.severity]||9);
  });
  document.getElementById('bugs').innerHTML=sortedBugs.map(b=>{
    const res=b.status==='resolved';
    const ulist=(b.affected_users||[]).map(u=>UNAMES[u]||u).join(', ');
    const shortDesc=(b.description||'').substring(0,120)+(b.description?.length>120?'…':'');
    return`<div class="bug">
      <span class="bug-id">${b.id}</span>
      <div class="bug-body">
        <div class="bug-title${res?' resolved':''}">${b.title}</div>
        <div class="bug-meta">
          ${sevBadge(b.severity)}
          ${stBadge(b.status)}
          ${ulist?`<span style="font-size:11px;color:var(--tx3)">👤 ${ulist}</span>`:''}
        </div>
        ${shortDesc?`<div class="bug-desc">${shortDesc}</div>`:''}
      </div>
    </div>`;
  }).join('');

  // tasks
  document.getElementById('task-ct').textContent=`${stats.open_tasks} open / ${stats.total_tasks} total`;
  const sortedTasks=[...tasks].sort((a,b)=>{
    const po={P1:0,P2:1,P3:2,trivial:3};
    if(a.status==='done'&&b.status!=='done')return 1;
    if(b.status==='done'&&a.status!=='done')return -1;
    return(po[a.priority]||9)-(po[b.priority]||9);
  });
  document.getElementById('tasks').innerHTML=sortedTasks.map(t=>`
    <div class="task">
      <span class="task-id">${t.id}</span>
      <span class="task-title${t.status==='done'?' done':''}">${t.title}</span>
      ${priBadge(t.priority)}
      <span class="task-effort">${effort(t.effort)}</span>
    </div>`
  ).join('');

  // users
  document.getElementById('user-ct').textContent=`${stats.total_users} registered`;
  const USER_DEF={
    '264468965':{name:'Andrii (Owner)',role:'owner',
      checks:[
        {ok:true, l:'Approved & active'},
        {ok:true, l:'LinkedIn linked'},
        {ok:true, l:'Brand voice ✓'},
        {ok:true, l:'Strategy ✓'},
      ]},
    '373382939':{name:'Rudolf',role:'approved_user',
      checks:[
        {ok:true,  l:'Approved'},
        {ok:false, l:'LinkedIn not linked'},
        {ok:false, l:'No brand voice'},
        {ok:false, l:'No strategy'},
      ]},
    '547748231':{name:'Catherine Miliutenko',role:'approved_user',
      checks:[
        {ok:true, l:'Approved (fixed ✓)'},
        {ok:true, l:'LinkedIn linked'},
        {ok:true, l:'Brand voice ✓'},
        {ok:true, l:'Strategy created ✓'},
      ]},
  };
  document.getElementById('users').innerHTML=Object.entries(USER_DEF).map(([uid,u])=>{
    const all=u.checks.every(c=>c.ok);
    const any=u.checks.some(c=>!c.ok);
    const dotCls=all?'d-green':any?'d-yellow':'d-red';
    return`<div class="ucard">
      <div class="u-hdr">
        <div>
          <div class="u-name">${u.name}</div>
          <div class="u-uid">${uid}</div>
          <div class="u-role">${u.role}</div>
        </div>
        <span class="dot ${dotCls}"></span>
      </div>
      <div class="u-checks">
        ${u.checks.map(c=>`
          <div class="uc ${c.ok?'uc-ok':'uc-warn'}">${c.ok?'✓':'⚠'} ${c.l}</div>
        `).join('')}
      </div>
    </div>`;
  }).join('');

  // sessions progress
  const total=stats.total_sessions||37;
  const done=stats.analyzed_sessions||0;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-row').innerHTML=
    `<span>${done} analyzed</span><span>${pct}% (${total-done} remaining)</span>`;
  document.getElementById('prog-bar').style.width=pct+'%';

  // by-user breakdown
  const byUser={};
  Object.values(sessions).forEach(s=>{
    if(!s.analyzed)return;
    const u=UNAMES[s.user_id]||'Unknown';
    byUser[u]=(byUser[u]||0)+1;
  });
  document.getElementById('by-user').textContent=
    'By user: '+(Object.entries(byUser).map(([u,c])=>`${u} (${c})`).join(' · ')||'none yet');

  // session table — analyzed sessions sorted by date desc
  const analyzed=Object.values(sessions)
    .filter(s=>s.analyzed)
    .sort((a,b)=>(b.date||'').localeCompare(a.date||''))
    .slice(0,12);

  document.getElementById('sess-rows').innerHTML=analyzed.map(s=>{
    const bugs=(s.bugs_referenced||[]).join(', ')||`${(s.findings||[]).length} findings`;
    const short=(s.file||'').replace(/\.jsonl.*/,'').substring(0,14)+'…';
    const topicLabel=s.topic?`topic-${s.topic}`:(s.session_key||'').split(':').slice(-1)[0]||'—';
    return`<tr>
      <td class="mono">${short}</td>
      <td>${UNAMES[s.user_id]||'?'}</td>
      <td>${topicLabel}</td>
      <td style="color:var(--tx2)">${s.date||'?'}</td>
      <td style="color:var(--tx2)">${bugs}</td>
    </tr>`;
  }).join('');
}

async function tryFetch(){
  try{
    const [b,t,u,s]=await Promise.all([
      fetch('./data/bugs.json'),
      fetch('./data/tasks.json'),
      fetch('./data/users.json'),
      fetch('./data/analysis-state.json'),
    ]);
    if(!b.ok)throw new Error('fetch failed');
    const bd=await b.json(), td=await t.json(), ud=await u.json(), sd=await s.json();
    const bugs=bd.bugs||[], tasks=td.tasks||[];
    const nd={...DATA,bugs,tasks,users:ud,sessions:sd,
      built_at:DATA.built_at+' (live)',
      stats:{...DATA.stats,
        total_bugs:bugs.length,
        open_bugs:bugs.filter(x=>x.status==='open').length,
        resolved_bugs:bugs.filter(x=>x.status==='resolved').length,
        total_tasks:tasks.length,
        open_tasks:tasks.filter(x=>x.status==='open').length,
        done_tasks:tasks.filter(x=>x.status==='done').length,
        total_sessions:Object.keys(sd).length||DATA.stats.total_sessions,
        analyzed_sessions:Object.values(sd).filter(x=>x.analyzed).length,
      }};
    document.getElementById('live-badge').style.display='inline';
    render(nd);
  }catch(e){
    render(DATA); // fallback to embedded
  }
}

render(DATA);
</script>
